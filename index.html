<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Important Dates Explorer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- PapaParse for CSV Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* Custom scrollbar for sidebar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        /* Map container */
        #map {
            z-index: 1;
        }
        .leaflet-popup-content-wrapper {
            border-radius: 0.5rem;
        }
        
        /* Custom range slider for the dual-track timeline */
        .custom-range {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }
        .custom-range:focus {
            outline: none;
        }
        .custom-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 60px; /* Spans both tracks */
            width: 4px;
            background: #3b82f6; /* blue-500 */
            border-radius: 2px;
            cursor: pointer;
            border: 1px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .custom-range::-moz-range-thumb {
            height: 60px;
            width: 4px;
            background: #3b82f6;
            border-radius: 2px;
            cursor: pointer;
            border: 1px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col font-sans overflow-hidden relative">

    <!-- Main Content Area -->
    <main class="flex-1 flex overflow-hidden relative">
        
        <!-- Sidebar: Event List -->
        <aside id="mainSidebar" class="w-96 bg-white border-r border-slate-200 flex flex-col shadow-[4px_0_15px_-3px_rgba(0,0,0,0.1)] z-10 transition-transform">
            <div class="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center shrink-0">
                <h2 class="text-lg font-semibold text-slate-700">Events in Timeframe</h2>
                <span id="eventCount" class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
            </div>
            
            <div id="eventsList" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Initial State -->
                <div class="text-center text-slate-500 mt-10">
                    <svg class="w-12 h-12 mx-auto mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <p>Please upload the dataset to view events.</p>
                </div>
            </div>
        </aside>

        <!-- Map & Wiki Wrapper -->
        <div id="mapWrapper" class="flex-1 flex relative overflow-hidden">
            <!-- Map Container -->
            <div id="map" class="flex-1 bg-slate-200 relative transition-all duration-300 cursor-pointer">
                <div id="loadingOverlay" class="absolute inset-0 bg-white/80 z-[1000] flex flex-col items-center justify-center hidden">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
                    <p class="text-slate-700 font-medium loading-text">Processing geographic data...</p>
                </div>
            </div>

            <!-- Wikipedia Panel (Half size of map area) -->
            <div id="wikiPanel" class="w-1/2 bg-white border-l border-slate-200 flex-col shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.1)] z-[1000] hidden transition-all duration-300">
                <div class="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center shrink-0">
                    <div class="flex items-center space-x-2">
                        <svg class="w-5 h-5 text-slate-600" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
                        <h2 class="text-lg font-semibold text-slate-700">Historical Context</h2>
                    </div>
                    <button id="closeWikiBtn" class="text-slate-400 hover:text-red-500 transition-colors" title="Close Panel">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div id="wikiContent" class="flex-1 overflow-y-auto p-6">
                    <!-- Wiki content injected here -->
                </div>
            </div>
        </div>

        <!-- NEW: Parallel History Overlay View -->
        <div id="parallelView" class="absolute inset-0 z-[1500] bg-slate-50 hidden flex-row overflow-hidden">
            <!-- Left Side: China -->
            <div class="flex-1 flex flex-col border-r border-slate-300">
                <div class="bg-red-50 text-red-800 p-4 font-bold text-lg border-b border-red-200 shrink-0 shadow-sm z-10 flex justify-between items-center">
                    <span class="flex items-center space-x-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> <span>CHINA EVENTS</span></span>
                    <span id="parallelLeftCount" class="bg-red-200 text-red-900 text-xs px-2.5 py-1 rounded-full shadow-inner">0</span>
                </div>
                <div id="parallelLeftList" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-100/50 relative"></div>
            </div>
            
            <!-- Right Side: World / Selected Country -->
            <div class="flex-1 flex flex-col">
                <div class="bg-blue-50 text-blue-800 p-4 font-bold text-lg border-b border-blue-200 shrink-0 shadow-sm z-10 flex justify-between items-center">
                    <span class="flex items-center space-x-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> <span id="parallelRightTitle">WORLD EVENTS</span></span>
                    <span id="parallelRightCount" class="bg-blue-200 text-blue-900 text-xs px-2.5 py-1 rounded-full shadow-inner">0</span>
                </div>
                <div id="parallelRightList" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-100/50 relative"></div>
            </div>
        </div>

    </main>

    <!-- Footer / Timeline Scrubber -->
    <footer class="bg-white border-t border-slate-200 p-4 shrink-0 shadow-[0_-4px_15px_-3px_rgba(0,0,0,0.1)] z-10">
        <div class="w-full">
            
            <!-- Timeline Controls -->
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center space-x-4">
                    <button id="playBtn" class="w-10 h-10 flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white rounded-full transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <!-- Play Icon -->
                        <svg id="iconPlay" class="w-5 h-5 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                        <!-- Pause Icon -->
                        <svg id="iconPause" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    </button>
                    
                    <div class="flex flex-col">
                        <span class="text-xs text-slate-500 font-semibold uppercase tracking-wider">Selected Year</span>
                        <span id="currentYearDisplay" class="text-2xl font-bold text-slate-800">----</span>
                    </div>
                </div>

                <div class="flex items-center space-x-3">
                    <label class="text-sm font-medium text-slate-600">Time Window:</label>
                    <div id="windowDropdown" class="relative">
                        <button id="windowBtn"
                            class="flex items-center gap-2 bg-white border border-slate-300 rounded-lg px-3 py-1.5 text-sm text-slate-700 shadow-sm hover:border-blue-400 hover:shadow-md transition-all cursor-pointer min-w-[120px]">
                            <span id="windowBtnLabel" class="flex-1 text-left font-medium">± 50 Years</span>
                            <svg class="w-3.5 h-3.5 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        <div id="windowMenu"
                            class="hidden absolute bottom-full mb-2 left-0 z-[9999] bg-white border border-slate-200 rounded-xl shadow-2xl min-w-[160px] py-1">
                        </div>
                    </div>
                </div>

                <div class="flex items-center space-x-2 border-l border-slate-300 pl-4 ml-2">
                    <label class="text-sm font-medium text-slate-600">Category:</label>
                    <div id="categoryDropdown" class="relative">
                        <button id="categoryBtn" disabled
                            class="flex items-center gap-2 bg-white border border-slate-300 rounded-lg px-3 py-1.5 text-sm text-slate-700 shadow-sm hover:border-blue-400 hover:shadow-md transition-all cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed min-w-[155px] max-w-[200px]">
                            <span id="categoryBtnEmoji" class="text-base leading-none">🗂️</span>
                            <span id="categoryBtnLabel" class="flex-1 text-left truncate font-medium">All Categories</span>
                            <svg class="w-3.5 h-3.5 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        <div id="categoryMenu"
                            class="hidden absolute bottom-full mb-2 left-0 z-[9999] bg-white border border-slate-200 rounded-xl shadow-2xl min-w-[200px] py-1">
                        </div>
                    </div>
                </div>

                <div class="flex items-center space-x-2 border-l border-slate-300 pl-4 ml-2">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="chinaOnlyToggle" class="sr-only peer" disabled>
                        <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-red-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-red-500 disabled:opacity-50"></div>
                        <span class="ml-2 text-sm font-medium text-slate-600">China Only</span>
                    </label>
                </div>
                
                <!-- NEW: Parallel History Toggle -->
                <div class="flex items-center space-x-2 border-l border-slate-300 pl-4 ml-2">
                    <label class="relative inline-flex items-center cursor-pointer" title="Compare China history with the rest of the world">
                        <input type="checkbox" id="parallelToggle" class="sr-only peer" disabled>
                        <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-indigo-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600 disabled:opacity-50"></div>
                        <span class="ml-2 text-sm font-bold text-indigo-700 uppercase tracking-wide">Parallel Mode</span>
                    </label>
                </div>

                <!-- Dynamic Country Filter UI -->
                <div id="countryFilterContainer" class="hidden items-center space-x-2 border-l border-slate-300 pl-4 ml-2">
                    <span class="text-sm font-medium text-slate-600">Focus:</span>
                    <span id="activeCountryLabel" class="bg-indigo-100 text-indigo-800 text-xs font-bold px-2 py-1 rounded">Country</span>
                    <button id="clearCountryBtn" class="text-slate-400 hover:text-red-500 transition-colors" title="Clear Country Filter">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Slider -->
            <div class="flex items-center space-x-4">
                <span id="minYearLabel" class="text-xs font-medium text-slate-500 w-12 shrink-0 text-right">Min</span>
                <div id="timelineContainer" class="relative flex-1 min-w-0 h-16 flex items-center justify-center cursor-crosshair overflow-hidden" title="Scroll to zoom | Drag to pan timeline">

                    <!-- Zoom/Pan Hint -->
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 text-[9px] font-bold tracking-wider text-slate-400 uppercase pointer-events-none">
                        Scroll to zoom • Click/Drag to pan
                    </div>
                    
                    <!-- Background Tracks Container -->
                    <div class="absolute inset-x-0 h-[44px] flex flex-col justify-between pointer-events-none mt-2">
                        <!-- Top Track (ALWAYS China) -->
                        <div class="relative w-full h-[20px] bg-slate-100 rounded-sm shadow-inner overflow-hidden border border-slate-300">
                            <div id="topTrack" class="absolute inset-0"></div>
                            <div id="topTrackLabel" class="absolute left-1 top-0 text-[8px] text-slate-400 font-bold z-0 bg-white/50 px-1 rounded-sm mt-0.5">CHINA</div>
                        </div>
                        
                        <!-- World Periods Track -->
                        <div class="relative w-full h-[20px] bg-slate-100 rounded-sm shadow-inner overflow-hidden border border-slate-300">
                            <div id="bottomTrack" class="absolute inset-0"></div>
                            <div id="bottomTrackLabel" class="absolute left-1 bottom-0 text-[8px] text-slate-400 font-bold z-0 bg-white/50 px-1 rounded-sm mb-0.5">WORLD</div>
                        </div>
                        
                        <!-- Spikes Container (Overlays tracks) -->
                        <div id="spikesContainer" class="absolute inset-0 z-10"></div>
                    </div>

                    <!-- Time Window Bracket -->
                    <div id="windowBracket" class="absolute h-[44px] mt-2 z-[15] pointer-events-none"
                         style="display:none; border-left:1.5px solid rgba(59,130,246,0.75); border-right:1.5px solid rgba(59,130,246,0.75); background:rgba(59,130,246,0.07);"></div>

                    <!-- Range Slider -->
                    <input type="range" id="yearSlider" min="0" max="100" value="50" disabled
                        class="absolute inset-0 w-full h-full custom-range z-20 m-0 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">

                    <!-- Cross-track Connecting Dots — must be a sibling of the slider at z-[30] so it renders above it -->
                    <div id="connectingDotsContainer" class="absolute inset-x-0 h-[44px] mt-2 z-[30] pointer-events-none"></div>
                </div>
                <span id="maxYearLabel" class="text-xs font-medium text-slate-500 w-12 shrink-0 text-left">Max</span>
            </div>

            <!-- Year Axis -->
            <div class="flex items-start space-x-4 mt-1">
                <div class="w-12 shrink-0"></div>
                <div id="yearAxis" class="relative flex-1 min-w-0 h-6 pointer-events-none overflow-hidden"></div>
                <div class="w-12 shrink-0"></div>
            </div>

        </div>
    </footer>

                const clickLat = e.latlng.lat;
                const clickLng = e.latlng.lng;
                let nearest = null;
                let minDist = Infinity;
                const seenCoords = new Set();

                for (const [name, coords] of Object.entries(countryCoordinates)) {
                    // Skip duplicate coordinates — keeps common name over official name (inserted first)
                    const key = `${coords[0]},${coords[1]}`;
                    if (seenCoords.has(key)) continue;
                    seenCoords.add(key);

                    const dlat = coords[0] - clickLat;
                    let dlng = coords[1] - clickLng;
                    if (dlng > 180) dlng -= 360;
                    if (dlng < -180) dlng += 360;
                    const dist = dlat * dlat + dlng * dlng;
                    if (dist < minDist) { minDist = dist; nearest = name; }
                }

                if (nearest) setGlobalSelectedCountry(nearest);
            });
        }

                data.forEach(country => {

                        if (country.name.official) countryCoordinates[country.name.official.toLowerCase()] = country.latlng;
                    }
                });

                const overrides = {

                    "yugoslavia": [44.0165, 21.0059], "northern mexico": [28.6329, -106.0691],
                };
                Object.assign(countryCoordinates, overrides);

        function formatYear(year) { return (year < 0) ? `${Math.abs(year)} BC` : `${year} AD`; }

        function cleanField(v) {
            const s = String(v || '').trim();

        }

        function parseYear(yearStr) {
            if (!yearStr || yearStr === "Unknown" || yearStr === "") return null;
            let y = String(yearStr).trim().toUpperCase();
            y = y.replace(/^C\.?\s*/i, '');
            let isBC = y.includes("BC") || y.includes("BCE");
            
            let centuryMatch = y.match(/(\d+)(?:ST|ND|RD|TH)?\s*CENTURY/);
            if (centuryMatch) {
                let century = parseInt(centuryMatch[1], 10);
                let val = (century - 1) * 100;
                return isBC ? -val : val;
            }

            let match = y.match(/\d+/);
            if (!match) return null;
            let val = parseInt(match[0], 10);
            return isBC ? -val : val;
        }

            }
            return null;
        }

        // --- Core Wikipedia Fetching & Caching Engine ---
        async function fetchWikiData(ev) {
            if (wikiCache.has(ev.title)) return wikiCache.get(ev.title);
            
            try {
                let wikiTitle = '';
                if (ev.wikiUrl) {
                    try {
                        const urlObj = new URL(ev.wikiUrl);
                        wikiTitle = decodeURIComponent(urlObj.pathname.split('/').pop());
                    } catch(e) {}
                }

                if (!wikiTitle) {
                    const searchRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(ev.title)}&utf8=&format=json&origin=*`);
                    if (!searchRes.ok) throw new Error("Wikipedia search API failed");
                    const searchData = await searchRes.json();
                    if (!searchData.query || !searchData.query.search || searchData.query.search.length === 0) {
                        wikiCache.set(ev.title, null); return null;
                    }
                    wikiTitle = searchData.query.search[0].title;
                }

                const summaryRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`);
                if (!summaryRes.ok) throw new Error("Wikipedia summary API failed");
                const summaryData = await summaryRes.json();

                const result = {
                    title: summaryData.title,
                    description: summaryData.description,
                    extract_html: summaryData.extract_html,
                    thumbnail: summaryData.thumbnail ? summaryData.thumbnail.source : null,
                    page: (summaryData.content_urls && summaryData.content_urls.desktop) ? summaryData.content_urls.desktop.page : '#'
                };
                wikiCache.set(ev.title, result);
                return result;
            } catch (error) {
                console.error("Wikipedia API error:", error);
                wikiCache.set(ev.title, null);
                return null;
            }
        }

        // Load into right-side Panel (Map Mode)

            wikiContent.innerHTML = html;

            // Cap portrait images to 1.1× the height a landscape (4:3) photo would occupy
            const wikiImg = wikiContent.querySelector('img');
            if (wikiImg) {
                const applyPortraitCap = () => {
                    if (wikiImg.naturalHeight > wikiImg.naturalWidth) {
                        // reference landscape height = display-width × (3/4); cap portrait at 1.1× that
                        const maxH = wikiImg.offsetWidth * (3 / 4) * 1.1;
                        wikiImg.style.maxHeight = maxH + 'px';
                    }
                };
                if (wikiImg.complete && wikiImg.naturalWidth) applyPortraitCap();
                else wikiImg.addEventListener('load', applyPortraitCap, { once: true });
            }
        }

        // Thumbnail Observer for Parallel Mode
        const thumbObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const imgEl = entry.target;
                    const evTitle = imgEl.dataset.title;
                    const evWiki = imgEl.dataset.wiki;
                    
                    fetchWikiData({ title: evTitle, wikiUrl: evWiki }).then(data => {

                            imgEl.classList.remove('opacity-0');
                            const placeholder = imgEl.parentElement.querySelector('.placeholder-icon');
                            if (placeholder) placeholder.style.display = 'none';
                        }
                    });
                    observer.unobserve(imgEl);
                }
            });
        }, { rootMargin: "100px" });



        // Process Parsed Data

            eventsData = [];

            const isNewFormat = data.length > 0 && data[0].hasOwnProperty('Event / Figure');
            const isTranslationFormat = data.length > 0 && data[0].hasOwnProperty('Event_Description_EN');

            data.forEach(row => {
                let rawYear, title, category, outcome, impact, region, wikiUrl;
                
                if (isTranslationFormat) {
                    let fullDesc = row['Event_Description_EN'] || '';
                    let splitParts = fullDesc.split(':');
                    if (splitParts.length > 1 && splitParts[0].length < 35 && /\d/.test(splitParts[0])) {
                        rawYear = splitParts[0].trim();
                        title = splitParts.slice(1).join(':').trim();
                    } else {
                        rawYear = row['Time_Period_EN'] || '';
                        title = fullDesc;
                    }
                    category = row['Category_EN'] || 'Other';
                    outcome = 'Neutral'; impact = ''; region = 'World'; wikiUrl = null;
                } else {
                    rawYear = isNewFormat ? row['Year / Period'] : row['Year'];
                    title = isNewFormat ? row['Event / Figure'] : row['Name of Incident'];
                    category = (isNewFormat ? row['Category'] : row['Type of Event']) || 'Other';
                    outcome = isNewFormat ? "Neutral" : (cleanField(row['Outcome']) || 'Neutral');
                    impact = isNewFormat ? "" : cleanField(row['Impact']);
                    region = isNewFormat ? row['Region'] : cleanField(row['Country']);
                    wikiUrl = isNewFormat ? row['Wikipedia URL'] : null;
                }
                
                const numYear = parseYear(rawYear);
                
                if (numYear !== null) {
                    const countries = [];
                    const coordsList = [];
                    
                    if (isTranslationFormat || (isNewFormat && region === 'World')) {
                        const keywords = {

                            'Japan': 'Japan', 'China': 'China', 'Yellow Emperor': 'China', 'Lu Xun': 'China', 'Shang ': 'China', 'Zhou ': 'China', 'Qin ': 'China', 'Han ': 'China', 'Tang ': 'China', 'Song ': 'China', 'Ming ': 'China', 'Qing ': 'China',
                            'India': 'India', 'Indus Valley': 'India', 'Maurya': 'India', 'Gupta': 'India',
                            'Greece': 'Greece', 'Greek': 'Greece', 'Athens': 'Greece', 'Sparta': 'Greece',
                            'Rome': 'Italy', 'Roman': 'Italy', 'Italy': 'Italy',
                            'Britain': 'UK', 'English': 'UK', 'UK': 'UK', 'London': 'UK', 'Newton': 'UK', 'Shakespeare': 'UK',
                            'USA': 'USA', 'American': 'USA', 'United States': 'USA',
                            'Russia': 'Russia', 'Soviet': 'Russia', 'France': 'France', 'French': 'France',
                            'Germany': 'Germany', 'German': 'Germany', 'Frankfurt': 'Germany',
                            'Spain': 'Spain', 'Spanish': 'Spain', 'Picasso': 'Spain',
                            'Garcia Marquez': 'Colombia', 'Husserl': 'Germany', 'Joyce': 'Ireland', 'Orwell': 'UK'
                        };
                        
                        const kwMatches = [];
                        for (const [kw, mappedCountry] of Object.entries(keywords)) {
                            if (title.toLowerCase().includes(kw.toLowerCase())) kwMatches.push(mappedCountry);
                        }
                        
                        [...new Set(kwMatches)].forEach(c => {
                            countries.push(c);
                            const coords = getCoordinates(c, null);
                            if (coords) coordsList.push(coords);
                        });
                    } else if (isNewFormat && region && region !== 'World') {
                        countries.push(region.trim());
                        const coords = getCoordinates(region.trim(), null);
                        if (coords) coordsList.push(coords);
                    } else if (!isNewFormat && !isTranslationFormat) {
                        for (let i = 1; i <= 8; i++) {
                            const cName = cleanField(row[i === 1 ? 'Country' : `Country${i}`]);
                            if (cName) {
                                countries.push(cName);
                                const coords = getCoordinates(cName.trim(), row['Place Name']);
                                if (coords) coordsList.push(coords);
                            }
                        }
                    }

                    const uniqueCoords = [];
                    const seen = new Set();
                    coordsList.forEach(c => {
                        const key = `${c[0]},${c[1]}`;
                        if (!seen.has(key)) { seen.add(key); uniqueCoords.push(c); }
                    });

                    let primaryCoords = uniqueCoords.length > 0 ? uniqueCoords[0] : null;
                    if (!primaryCoords && !isTranslationFormat && !isNewFormat) primaryCoords = getCoordinates(region, row['Place Name']);
                    
                    // Assigning a unique ID to every event
                    eventsData.push({ 
                        id: `evt-${eventsData.length}`, 
                        title, category, outcome, impact, region, wikiUrl, rawYear, numYear: numYear, latlng: primaryCoords, allCountries: countries, allCoords: uniqueCoords 
                    });
                    validYears.push(numYear);
                    if (category && category.trim()) categories.add(category.trim());
                }
            });

            if (eventsData.length === 0) { alert("No valid events found."); return; }

            // Build custom category dropdown
            selectedCategory = 'All';
            categoryBtnEmoji.textContent = '🗂️';
            categoryBtnLabel.textContent = 'All Categories';
            categoryMenu.innerHTML = '';
            const allItem = buildCategoryMenuItem('All', '🗂️', 'All Categories');
            categoryMenu.appendChild(allItem);
            Array.from(categories).sort().forEach(cat => {
                const emoji = getCategoryEmoji(cat);
                categoryMenu.appendChild(buildCategoryMenuItem(cat, emoji, cat));
            });

            eventsData.sort((a, b) => a.numYear - b.numYear);
            globalMinYear = Math.min(...validYears);
            globalMaxYear = Math.max(...validYears);
            minYear = globalMinYear; maxYear = globalMaxYear;
            yearSlider.value = minYear; 
            
            yearSlider.disabled = false; playBtn.disabled = false; chinaOnlyToggle.disabled = false; categoryBtn.disabled = false; parallelToggle.disabled = false;
            updateTimelineBounds();
        }

        function updateTimelineBounds() {
            yearSlider.min = minYear;
            yearSlider.max = maxYear;
            let currentVal = parseInt(yearSlider.value, 10);
            if (currentVal < minYear) yearSlider.value = minYear;
            if (currentVal > maxYear) yearSlider.value = maxYear;
            
            minYearLabel.textContent = formatYear(minYear);
            maxYearLabel.textContent = formatYear(maxYear);
            
            renderTimelineBands();
            drawSpikes();
            renderYearAxis();
            updateVisualization();
        }

        // Render Dynasty/World/Country color blocks
        function renderTimelineBands() {
            const tTrack = document.getElementById('topTrack');
            const bTrack = document.getElementById('bottomTrack');
            const tTrackLabel = document.getElementById('topTrackLabel');
            const bTrackLabel = document.getElementById('bottomTrackLabel');
            tTrack.innerHTML = ''; bTrack.innerHTML = '';

            if (maxYear === minYear) return;
            const range = maxYear - minYear;

            const renderTrack = (periods, trackEl) => {
                if(!periods) return;
                periods.forEach(p => {
                    if (p.end < minYear || p.start > maxYear) return;
                    let s = Math.max(minYear, p.start);
                    let e = Math.min(maxYear, p.end);
                    let startPct = ((s - minYear) / range) * 100;
                    let widthPct = ((e - s) / range) * 100;
                    
                    let div = document.createElement('div');
                    div.className = `absolute h-full flex items-center justify-center border-r border-white/40 overflow-hidden text-[9px] font-bold text-slate-800/80 select-none ${p.color}`;
                    div.style.left = `${startPct}%`; div.style.width = `${widthPct}%`;
                    if (widthPct > 4.5) div.textContent = p.name;
                    div.title = `${p.name} (${formatYear(p.start)} - ${formatYear(p.end)})`;
                    trackEl.appendChild(div);
                });
            };

            // Top Track is ALWAYS China
            let topPeriods = countryTimelines['china']; 
            tTrackLabel.textContent = "CHINA";
            
            // Bottom Track is Selected Country OR World
            let bottomPeriods = worldPeriods;
            bTrackLabel.textContent = "WORLD";
            
            if (selectedCountry) {
                const specPeriods = getCountryTimeline(selectedCountry);
                if (specPeriods) {
                    bottomPeriods = specPeriods;
                    bTrackLabel.textContent = selectedCountry.toUpperCase();
                } else {
                    bottomPeriods = [];
                    bTrackLabel.textContent = selectedCountry.toUpperCase() + " (NO TIMELINE DATA)";
                }
            }

            renderTrack(topPeriods, tTrack);
            renderTrack(bottomPeriods, bTrack);
        }

        // Render year tick-mark axis below the two timeline tracks
        function renderYearAxis() {
            const axisEl = document.getElementById('yearAxis');
            if (!axisEl || maxYear === minYear) return;
            axisEl.innerHTML = '';

            const range = maxYear - minYear;

            // Pick a "nice" round interval so we get roughly 6-10 ticks
            const rawInterval = range / 8;
            const magnitude = Math.pow(10, Math.floor(Math.log10(Math.max(1, rawInterval))));
            const norm = rawInterval / magnitude;
            let interval = norm < 1.5 ? magnitude
                         : norm < 3.5 ? 2 * magnitude
                         : norm < 7.5 ? 5 * magnitude
                         : 10 * magnitude;
            interval = Math.max(1, Math.round(interval));

            const frag = document.createDocumentFragment();
            const firstTick = Math.ceil(minYear / interval) * interval;

            for (let year = firstTick; year <= maxYear; year += interval) {
                const pct = ((year - minYear) / range) * 100;
                if (pct < 0 || pct > 100) continue;

                const tick = document.createElement('div');
                tick.style.left = `${pct}%`;
                tick.style.transform = 'translateX(-50%)';
                tick.className = 'absolute top-0 flex flex-col items-center';

                const line = document.createElement('div');
                line.className = 'w-px h-1.5 bg-slate-400';

                const lbl = document.createElement('span');
                lbl.className = 'text-[8px] text-slate-500 font-medium whitespace-nowrap mt-0.5';
                lbl.textContent = year < 0 ? `${Math.abs(year)} BC` : `${year}`;

                tick.appendChild(line);
                tick.appendChild(lbl);
                frag.appendChild(tick);
            }

            axisEl.appendChild(frag);
        }

        // Draw spikes and cross-track connecting dots
        function drawSpikes() {
            spikesContainer.innerHTML = '';
            connectingDotsContainer.innerHTML = '';
            if (maxYear === minYear) return;

            const selectedCat = selectedCategory;
            const spikeFrag = document.createDocumentFragment();
            const dotFrag = document.createDocumentFragment();

            eventsData.forEach(ev => {
                if (selectedCat !== 'All' && ev.category !== selectedCat) return;

                const isChina = hasChina(ev);

                // Determine if this event also belongs to the bottom track
                let isBottomTrack = false;
                if (selectedCountry) {
                    isBottomTrack = eventMatchesCountry(ev, selectedCountry);
                } else {
                    // World track: event connects bottom if it has any non-China country
                    isBottomTrack = ev.allCountries && ev.allCountries.some(c => !c.toLowerCase().includes('china'));
                }

                if (!isChina) {
                    if (selectedCountry) {
                        if (!eventMatchesCountry(ev, selectedCountry)) return;
                    } else if (chinaOnlyToggle.checked) {
                        return;
                    }
                }

                const percent = ((ev.numYear - minYear) / (maxYear - minYear)) * 100;
                const spike = document.createElement('div');
                spike.style.left = `${percent}%`;

                if (isChina) {
                    spike.className = 'absolute w-[2px] bg-red-500 rounded-t-sm z-10';
                    spike.style.top = '-6px';
                    spike.style.height = '12px';
                } else {
                    spike.className = 'absolute w-[2px] bg-slate-500 rounded-b-sm z-10';
                    spike.style.bottom = '-6px';
                    spike.style.height = '12px';
                }
                spikeFrag.appendChild(spike);

                // Add a connecting dot when event spans BOTH the top (China) and bottom tracks
                if (isChina && isBottomTrack) {
                    const dot = document.createElement('div');
                    dot.style.left = `${percent}%`;
                    dot.style.top = '50%';
                    dot.style.transform = 'translate(-50%, -50%)';
                    dot.style.pointerEvents = 'auto';
                    dot.className = 'absolute w-2.5 h-2.5 bg-violet-600 rounded-full cursor-pointer border-2 border-white shadow-md hover:scale-150 transition-transform';
                    dot.title = `⬛ ${ev.title} (${ev.rawYear}) — spans both timelines`;
                    dot.addEventListener('click', (e) => {
                        e.stopPropagation();
                        clearTimeout(wikiDebounceTimer);
                        isWikiClosedByUser = false;
                        loadWikipediaSummary(ev);
                        activeLinesLayer.clearLayers();
                        drawEventLines(ev, activeLinesLayer);
                        if (ev.allCoords && ev.allCoords.length > 1) {
                            map.flyToBounds(L.latLngBounds(ev.allCoords), { padding: [50, 50], maxZoom: 5 });
                        } else if (ev.latlng) {
                            map.flyTo(ev.latlng, 5);
                        }
                        scrollToEvent(ev.id);
                    });
                    dotFrag.appendChild(dot);
                }
            });

            spikesContainer.appendChild(spikeFrag);
            connectingDotsContainer.appendChild(dotFrag);
        }

        function escapeHtml(unsafe) {
            return (unsafe||'').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // Render List logic for Parallel View
        function renderParallelList(eventsList, container, prefix) {

            if (eventsList.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-400 mt-10">No events in this period.</div>`;

                        <svg class="w-8 h-8 text-slate-400 placeholder-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>

        // Unified rendering manager
        function updateWindowBracket() {
            const bracket = document.getElementById('windowBracket');
            if (!bracket || maxYear === minYear) return;
            const windowSize = selectedWindow;
            if (windowSize === 0) { bracket.style.display = 'none'; return; }
            const currentYear = parseInt(yearSlider.value, 10);
            const range = maxYear - minYear;
            const leftPct  = Math.max(0,   ((currentYear - windowSize - minYear) / range) * 100);
            const rightPct = Math.min(100,  ((currentYear + windowSize - minYear) / range) * 100);
            if (rightPct <= leftPct) { bracket.style.display = 'none'; return; }
            bracket.style.left  = `${leftPct}%`;
            bracket.style.width = `${rightPct - leftPct}%`;
            bracket.style.display = 'block';
        }

        function updateVisualization() {
            const currentYear = parseInt(yearSlider.value, 10);
            const windowSize = selectedWindow;
            const selectedCat = selectedCategory;
            currentYearDisplay.textContent = formatYear(currentYear);
            updateWindowBracket();
            
            const startYear = currentYear - windowSize;
            const endYear = currentYear + windowSize;

            const baseActiveEvents = eventsData.filter(ev => {
                if (selectedCat !== 'All' && ev.category !== selectedCat) return false;
                return ev.numYear >= startYear && ev.numYear <= endYear;
            });
            
            const isParallelMode = parallelToggle.checked;

            if (isParallelMode) {
                parallelView.classList.remove('hidden');
                parallelView.classList.add('flex');
                mainSidebar.classList.add('hidden'); 
                
                const leftEvents = [];
                const rightEvents = [];
                
                baseActiveEvents.forEach(ev => {
                    const isChina = hasChina(ev);
                    if (isChina) {
                        leftEvents.push(ev);
                    } else {
                        if (!selectedCountry || eventMatchesCountry(ev, selectedCountry)) {
                            rightEvents.push(ev);
                        }
                    }
                });
                
                renderParallelList(leftEvents, parallelLeftList, 'parallel-left');
                renderParallelList(rightEvents, parallelRightList, 'parallel-right');
                
                parallelLeftCount.textContent = leftEvents.length;
                parallelRightCount.textContent = rightEvents.length;
                parallelRightTitle.textContent = selectedCountry ? selectedCountry.toUpperCase() + " EVENTS" : "WORLD EVENTS";
                
            } else {
                parallelView.classList.add('hidden');
                parallelView.classList.remove('flex');
                mainSidebar.classList.remove('hidden');

                const activeEvents = baseActiveEvents.filter(ev => {
                    const isChina = hasChina(ev);
                    if (!isChina) {
                        if (selectedCountry) {
                            if (!eventMatchesCountry(ev, selectedCountry)) return false;
                        } else if (chinaOnlyToggle.checked) {
                            return false;
                        }
                    }
                    return true;
                });
                
                markersLayer.clearLayers(); activeLinesLayer.clearLayers();
                eventsList.innerHTML = ''; eventCount.textContent = activeEvents.length;

                if (activeEvents.length > 0) {
                    const sortedActive = [...activeEvents].sort((a, b) => a.numYear - b.numYear);
                    clearTimeout(wikiDebounceTimer);
                    wikiDebounceTimer = setTimeout(() => { loadWikipediaSummary(sortedActive[0]); }, 600); 
                } else {
                    currentWikiQuery = null;
                }

                if (activeEvents.length === 0) {
                    eventsList.innerHTML = `<div class="text-center text-slate-400 mt-10"><p>No major events recorded in this timeframe.</p></div>`;
                    return;
                }

                const clusteredPrimary = {};
                activeEvents.forEach(ev => {
                    if (ev.allCoords && ev.allCoords.length > 0) {
                        const pKey = `${ev.allCoords[0][0]},${ev.allCoords[0][1]}`;
                        if (!clusteredPrimary[pKey]) clusteredPrimary[pKey] = { latlng: ev.allCoords[0], events: [] };
                        clusteredPrimary[pKey].events.push(ev);
                    } else if (ev.latlng) {
                        const key = `${ev.latlng[0]},${ev.latlng[1]}`;
                        if (!clusteredPrimary[key]) clusteredPrimary[key] = { latlng: ev.latlng, events: [] };
                        clusteredPrimary[key].events.push(ev);
                    }
                });

                Object.values(clusteredPrimary).forEach(cluster => {
                    const count = cluster.events.length;
                    const radius = 18;
                    const emoji = getCategoryEmoji(cluster.events[0].category);

                    const iconHtml = `<div class="flex items-center justify-center w-full h-full transition-transform hover:scale-125" style="font-size: ${radius*1.5}px; line-height: 1; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5)); text-shadow: 0px 0px 4px rgba(255,255,255,0.8);">${emoji}</div>`;
                    
                    const sectorIcon = L.divIcon({
                        html: iconHtml,
                        className: 'bg-transparent', 
                        iconSize: [radius*2, radius*2],
                        iconAnchor: [radius, radius],
                        popupAnchor: [0, -radius]
                    });

                    const marker = L.marker(cluster.latlng, { icon: sectorIcon }).addTo(markersLayer);

                    let popupHtml = `<div class="max-h-64 overflow-y-auto w-64 pr-2"><h3 class="font-bold text-slate-800 border-b pb-2 mb-2 sticky top-0 bg-white">${cluster.events[0].region} <span class="text-sm font-normal text-slate-500">(${count} Event${count>1?'s':''})</span></h3>`;
                    cluster.events.forEach(ev => {
                        popupHtml += `<div class="mb-3 pb-3 border-b border-slate-100 last:border-0 last:mb-0 last:pb-0"><h4 class="font-semibold text-sm text-blue-700 leading-tight mb-1">${ev.title}</h4><div class="flex items-center gap-2 mb-1"><span class="text-xs font-bold text-slate-500">${ev.rawYear}</span></div><p class="text-xs text-slate-600"><strong>Category:</strong> ${ev.category}</p>${ev.impact ? `<p class="text-xs text-slate-600 mt-1 line-clamp-3" title="${ev.impact}">${ev.impact}</p>` : ''}</div>`;
                    });
                    popupHtml += `</div>`;

                    marker.on('click', (e) => {
                        L.DomEvent.stopPropagation(e); 
                        activeLinesLayer.clearLayers(); 
                        
                        let allClusterCoords = [];
                        cluster.events.forEach(ev => { drawEventLines(ev, activeLinesLayer); if (ev.allCoords) allClusterCoords.push(...ev.allCoords); });

                        const uniqueLocs = new Set(allClusterCoords.map(c => `${c[0]},${c[1]}`));
                        if (uniqueLocs.size > 1) { map.flyToBounds(L.latLngBounds(allClusterCoords), { padding: [50, 50], maxZoom: 5 }); } 
                        else { map.flyTo(cluster.latlng, 5); }
                        
                        // We intentionally DO NOT update the bottom focus timeline when an emoji is clicked.
                        
                        clearTimeout(wikiDebounceTimer); // Prevent auto-loader overwrite
                        isWikiClosedByUser = false; 
                        loadWikipediaSummary(cluster.events[0]);
                        scrollToEvent(cluster.events[0].id);
                    });
                });

                activeEvents.sort((a, b) => a.numYear - b.numYear).forEach(ev => {
                    const el = document.createElement('div');
                    el.id = `list-item-${ev.id}`;
                    el.className = 'bg-white border border-slate-200 rounded-lg p-3 shadow-sm hover:shadow-md transition-all cursor-pointer';
                    el.innerHTML = `<div class="flex justify-between items-start mb-1"><h3 class="text-sm font-bold text-slate-800 leading-tight flex-1 pr-2">${ev.title}</h3><span class="text-xs font-bold whitespace-nowrap bg-slate-100 px-2 py-1 rounded text-slate-600">${ev.rawYear}</span></div><div class="flex items-center gap-2 mb-2 text-xs"><span class="font-medium text-slate-500 flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>${ev.allCountries && ev.allCountries.length > 0 ? ev.allCountries.join(', ') : ev.region}</span></div>${ev.impact ? `<p class="text-xs text-slate-600 mb-2">${ev.impact}</p>` : ''}<div class="flex items-center mt-2 pt-2 border-t border-slate-100"><span class="text-[10px] uppercase font-semibold text-slate-500">${ev.category}</span></div>`;
                    
                    el.addEventListener('click', () => {
                        activeLinesLayer.clearLayers();
                        drawEventLines(ev, activeLinesLayer);
                        if (ev.allCoords && ev.allCoords.length > 1) { map.flyToBounds(L.latLngBounds(ev.allCoords), { padding: [50, 50], maxZoom: 5 }); } 
                        else if (ev.latlng) { map.flyTo(ev.latlng, 5); }

                        clearTimeout(wikiDebounceTimer); // Prevent auto-loader overwrite
                        isWikiClosedByUser = false;
                        loadWikipediaSummary(ev);
                        scrollToEvent(ev.id);
                    });
                    
                    eventsList.appendChild(el);
                });
            }
        }

        // UI Event Listeners
        yearSlider.addEventListener('input', updateVisualization);
        chinaOnlyToggle.addEventListener('change', () => { drawSpikes(); updateVisualization(); });
        parallelToggle.addEventListener('change', updateVisualization);

        closeWikiBtn.addEventListener('click', () => {
            wikiPanel.classList.add('hidden'); wikiPanel.classList.remove('flex');
            isWikiClosedByUser = true; setTimeout(() => { if (map) map.invalidateSize(); }, 300); 
        });

        // Wheel to zoom
        timelineContainer.addEventListener('wheel', (e) => {
            if (!eventsData.length || yearSlider.disabled) return;
            e.preventDefault(); 
            const zoomFactor = 0.20; 
            const currentRange = maxYear - minYear;
            const zoomIn = e.deltaY < 0;
            if (zoomIn && currentRange <= 20) return; 
            if (!zoomIn && minYear === globalMinYear && maxYear === globalMaxYear) return; 
            
            const rect = timelineContainer.getBoundingClientRect();
            const mousePct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)); 
            const anchorYear = minYear + (currentRange * mousePct);
            
            let newRange = zoomIn ? currentRange * (1 - zoomFactor) : currentRange * (1 + zoomFactor);
            let newMin = anchorYear - (newRange * mousePct);
            let newMax = anchorYear + (newRange * (1 - mousePct));
            
            if (newMin < globalMinYear) newMin = globalMinYear;
            if (newMax > globalMaxYear) newMax = globalMaxYear;
            minYear = Math.floor(newMin); maxYear = Math.ceil(newMax);
            
            updateTimelineBounds();
        });

        // Drag to pan or click to move timeline
        timelineContainer.addEventListener('mousedown', (e) => {
            if (!eventsData.length || yearSlider.disabled) return;
            
            const rect = yearSlider.getBoundingClientRect();
            const range = maxYear - minYear;
            const thumbPct = (yearSlider.value - minYear) / range;
            const thumbX = rect.left + (rect.width * thumbPct);
            
            if (Math.abs(e.clientX - thumbX) > 15) {
                e.preventDefault(); 
                isDraggingTimeline = true;
                hasDraggedTimeline = false; 
                startMouseX = e.clientX;
                lastMouseX = e.clientX;
                timelineContainer.style.cursor = 'ew-resize';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isDraggingTimeline) {
                e.preventDefault(); 
                if (dragRafId) return;
                
                const clientX = e.clientX;
                if (Math.abs(clientX - startMouseX) > 3) {
                    hasDraggedTimeline = true;
                }
                
                dragRafId = requestAnimationFrame(() => {
                    const deltaX = clientX - lastMouseX;
                    lastMouseX = clientX;
                    
                    if (hasDraggedTimeline) {
                        const rect = timelineContainer.getBoundingClientRect();
                        const range = maxYear - minYear;
                        const yearsPerPixel = range / rect.width;
                        const shiftYears = deltaX * yearsPerPixel;
                        
                        let newMin = minYear - shiftYears;
                        let newMax = maxYear - shiftYears;
                        
                        if (newMin < globalMinYear) { newMin = globalMinYear; newMax = newMin + range; }
                        if (newMax > globalMaxYear) { newMax = globalMaxYear; newMin = newMax - range; }
                        
                        minYear = Math.floor(newMin);
                        maxYear = Math.ceil(newMax);
                        
                        updateTimelineBounds();
                    }
                    dragRafId = null;
                });
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (isDraggingTimeline) {
                isDraggingTimeline = false;
                timelineContainer.style.cursor = 'crosshair';
                if (dragRafId) { cancelAnimationFrame(dragRafId); dragRafId = null; }
                
                if (!hasDraggedTimeline) {
                    const rect = timelineContainer.getBoundingClientRect();
                    if (e.clientX >= rect.left && e.clientX <= rect.right) {
                        const clickPct = (e.clientX - rect.left) / rect.width;
                        const clickedYear = minYear + (maxYear - minYear) * clickPct;
                        yearSlider.value = Math.round(clickedYear);
                        updateVisualization(); 
                    }
                }
            }
        });

        function togglePlay() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                iconPlay.classList.add('hidden'); iconPause.classList.remove('hidden');
                playBtn.classList.replace('bg-blue-600', 'bg-red-500'); playBtn.classList.replace('hover:bg-blue-700', 'hover:bg-red-600');
                const range = maxYear - minYear;
                const step = Math.max(1, Math.floor(range / 100));

                playInterval = setInterval(() => {
                    let nextVal = parseInt(yearSlider.value) + step;
                    if (nextVal > maxYear) { nextVal = maxYear; togglePlay(); }
                    yearSlider.value = nextVal; updateVisualization();
                }, 200);
            } else {
                iconPlay.classList.remove('hidden'); iconPause.classList.add('hidden');
                playBtn.classList.replace('bg-red-500', 'bg-blue-600'); playBtn.classList.replace('hover:bg-red-600', 'hover:bg-blue-700');
                clearInterval(playInterval);
            }
        }

        playBtn.addEventListener('click', togglePlay);

        window.addEventListener('DOMContentLoaded', async () => {
            initMap();
            await loadCountryCoordinates();

            // Auto-load CSV from the same folder (requires a local HTTP server, e.g. python3 -m http.server)
            try {
                const resp = await fetch('./World_Important_Dates_8_Sectors.csv');
                if (resp.ok) {
                    const text = await resp.text();
                    loadingOverlay.classList.remove('hidden');
                    Papa.parse(text, {
                        header: true, skipEmptyLines: true,
                        complete: (results) => { processData(results.data); loadingOverlay.classList.add('hidden'); },
                        error:    ()         => { loadingOverlay.classList.add('hidden'); }
                    });
                }
            } catch(e) {
                loadingOverlay.classList.add('hidden');
                console.error('Could not load CSV – make sure you are running a local HTTP server:', e);
            }

            window.addEventListener('resize', () => { if(map) map.invalidateSize(); });
        });
    </script>
</body>
</html>
